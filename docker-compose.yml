version: '3.8'

services:
  # PHP-FPM application server
  app:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: pharma_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
    networks:
      - pharma_network
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=pharmacovigilance
      - DB_USERNAME=pharma_user
      - DB_PASSWORD=secret
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025

  # Nginx web server
  nginx:
    image: nginx:alpine
    container_name: pharma_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pharma_network

  # MySQL 8 database
  mysql:
    image: mysql:8.0
    container_name: pharma_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: pharmacovigilance
      MYSQL_USER: pharma_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pharma_network

  # Node dev server for Vue SPA
  frontend:
    image: node:20-alpine
    container_name: pharma_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app
    networks:
      - pharma_network

  # Mailpit for local email testing
  mailpit:
    image: axllent/mailpit
    container_name: pharma_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - pharma_network

networks:
  pharma_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
